<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quote Generator</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <h1>Quote Generator</h1>
        <div class="quote-box">
            <div class="quote-content">
                <p class="quote-text" id="quote">
                    "The only way to do great work is to love what you do."
                </p>
                <p class="quote-author" id="author">— Steve Jobs</p>
            </div>
            <div class="buttons">
                <button id="new-quote" class="btn btn-primary">
                    <i class="fas fa-sync-alt"></i> New Quote
                </button>
                <button id="copy-quote" class="btn btn-secondary">
                    <i class="fas fa-copy"></i> Copy
                </button>
                <button id="tweet-quote" class="btn btn-twitter">
                    <i class="fab fa-twitter"></i> Tweet
                </button>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
